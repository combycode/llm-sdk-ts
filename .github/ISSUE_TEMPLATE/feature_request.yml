name: Feature request
description: Propose a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the SDK makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: The API or behavior you would like. Sketch the call site if you can.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you have tried, or other designs you weighed.
    validations:
      required: false
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      description: The SDK is zero-runtime-dependency and cross-environment.
      options:
        - label: My proposal can work without adding a runtime dependency.
        - label: My proposal can work in Node, Bun, and the browser.
