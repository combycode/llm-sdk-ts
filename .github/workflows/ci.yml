name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  BUN_VERSION: "1.3.5"

jobs:
  check:
    name: lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run build
      - name: Assert browser bundle is node-free
        shell: bash
        run: |
          if grep -Eq 'from"node:|import\("node:|async_hooks' dist/index.browser.js; then
            echo "browser bundle contains a live node: import"; exit 1
          fi
          echo "browser bundle is node-free"

  test:
    name: test (${{ matrix.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - run: bun test
